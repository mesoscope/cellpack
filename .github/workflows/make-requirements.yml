name: Make requirements files

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "uv.lock"

jobs:
  make-requirements:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macOS-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Generate requirements.txt
        shell: bash
        run: |
          case "${{ matrix.os }}" in
              "ubuntu-latest")
                  export PLATFORM="linux"
                  ;;
              "macOS-latest")
                  export PLATFORM="macos"
                  ;;
              "windows-latest")
                  export PLATFORM="windows"
                  ;;
          esac

          rm -rf requirements/*
          mkdir -p requirements/$PLATFORM
          uv export --no-hashes --format requirements-txt --output-file requirements/$PLATFORM/requirements.txt

      - name: Get platform variable
        id: platform
        shell: bash
        run: |
          case "${{ matrix.os }}" in
              "ubuntu-latest")
                  echo "platform=linux" >> $GITHUB_OUTPUT
                  ;;
              "macOS-latest")
                  echo "platform=macos" >> $GITHUB_OUTPUT
                  ;;
              "windows-latest")
                  echo "platform=windows" >> $GITHUB_OUTPUT
                  ;;
          esac

      - name: Upload requirements files
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.platform.outputs.platform }}-requirements
          path: requirements/${{ steps.platform.outputs.platform }}

  open-PR:
    needs: [make-requirements]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Download linux requirements files
        uses: actions/download-artifact@v6
        with:
          name: linux-requirements
          path: requirements/linux

      - name: Download windows requirements files
        uses: actions/download-artifact@v6
        with:
          name: windows-requirements
          path: requirements/windows

      - name: Download macOS requirements files
        uses: actions/download-artifact@v6
        with:
          name: macos-requirements
          path: requirements/macos

      - name: Clean-up CRLF
        shell: bash
        run: find requirements -type f -exec sed -i 's/\r//g' {} \;

      - name: Get timestamp
        id: timestamp
        run: echo "timestamp=$(date +'%Y-%m-%d_%H-%M')" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.WORKFLOW_PAT }}@github.com/${{ github.repository }}
          BRANCH="admin/requirements-update_${{ steps.timestamp.outputs.timestamp }}"
          git checkout -b "$BRANCH"
          git add requirements/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Updating requirements.txt after change to \`uv.lock\` was pushed to \`main\`"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "admin/requirements-update_${{ steps.timestamp.outputs.timestamp }}" \
            --body "Updating requirements.txt."